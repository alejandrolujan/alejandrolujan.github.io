<html>
	<head>
		<link rel="stylesheet" type="text/css" href="style.css">
		<title>Questions</title>
	
		<script>

			let kudos = [];

			function readFile() {
				return fetch('kudos.txt')
					.then(response => response.text())
					.then(text => {
						console.log(text);
						kudos = text.split(/\n|\r/g);
						console.log(kudos);
						});
			}

			function showKudo() {
				let randomIndex = Math.floor(Math.random() * kudos.length);				
				console.log(randomIndex);
				document.getElementById("kudos").innerHTML = kudos[randomIndex];
				console.log(document.getElementById("kudos").innerHTML);
			}
	
			function showRandomKudo() {
				readFile().then(showKudo());				
			}

		</script>
	</head>  
	
	<body>
		<div id="content">
			<h1>Kudos</h1>

			<h3 id="kudos">&nbsp;</h3>
			<script>
				showRandomKudo();
			</script>
		</div>
	</body>
</html>
